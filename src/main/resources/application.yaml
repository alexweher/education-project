spring:
  application:
    name: EducationProject

  datasource:
    url: jdbc:postgresql://localhost:5432/userservice
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
logging:
  level:
    root: INFO
    com.example.EducationProject: DEBUG